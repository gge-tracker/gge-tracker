apiVersion: 1

providers:
  - name: 'admin'
    orgId: 1
    folder: 'Admin'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/admin

  - name: 'mod'
    orgId: 1
    folder: 'Mod'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/mod
