apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    jsonData:
      port: 8123
      host: $CLICKHOUSE_HOST
      username: $CLICKHOUSE_USER
      protocol: http
    secureJsonData:
      password: $CLICKHOUSE_PASSWORD
