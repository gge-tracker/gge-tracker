<button class="btn-modern btn-filter" data-bs-toggle="modal" data-bs-target="#filtersModal" [title]="'Filtrer' | translate">
  <lucide-icon class="lucide lucide-funnel" [img]="Funnel"></lucide-icon> {{ 'Filtrer' | translate }}
  @if (countFilterActivated() > 0) {
    <span class="filter-badge">{{ countFilterActivated() }}</span>
  }
</button>
